<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏕️ Camping Checklist</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial,sans-serif;background:#f3f7f1;max-width:760px;margin:auto;padding:20px}
h1{text-align:center;color:#2e6b3a}
#progress{text-align:center;font-weight:bold}
#search{width:100%;padding:12px;border-radius:8px;border:1px solid #bbb;margin:15px 0}
h2{background:#2e6b3a;color:#fff;padding:10px;border-radius:8px}
label{display:flex;align-items:center;gap:12px;background:#fff;margin:8px 0;padding:10px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
input[type=checkbox]{width:20px;height:20px}
.done span{text-decoration:line-through;color:#888}
</style>
</head>

<body>

<h1>🏕️ Camping Checklist</h1>
<p id="progress"></p>
<input id="search" placeholder="🔍 搜索装备...">

<div id="list"></div>

<script>
// 1️⃣ Supabase 连接（已替换你的信息）
const SUPABASE_URL = "https://yscqeouavzoupwhderld.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzY3Flb3VhdnpvdXB3aGRlcmxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDc2NTYsImV4cCI6MjA5ODg4MzY1Nn0.k1-Ww_SLjnXM3_4Fn8YR00SCYZNn4jsFF7AsaTTLDqY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const list = document.getElementById("list");

// 2️⃣ 读取数据
async function loadData(){
  const { data, error } = await client
    .from("checklist")
    .select("*")
    .order("id");

  if(error){
    console.error(error);
    return;
  }

  render(data);
}

// 3️⃣ 渲染
function render(data){
  list.innerHTML = "";

  // 按分类分组
  const grouped = {};
  data.forEach(item => {
    if(!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });

  let total = data.length;
  let checkedCount = data.filter(i => i.checked).length;

  document.getElementById("progress").textContent =
    `已完成 ${checkedCount} / ${total}`;

  // 渲染 UI
  for(const cat in grouped){
    const h = document.createElement("h2");
    h.textContent = cat;
    list.appendChild(h);

    grouped[cat].forEach(row => {
      const label = document.createElement("label");

      label.innerHTML = `
        <input type="checkbox" ${row.checked ? "checked" : ""}>
        <span>${row.item}</span>
      `;

      const box = label.querySelector("input");

      if(row.checked){
        label.classList.add("done");
      }

      box.onchange = async () => {
        label.classList.toggle("done", box.checked);

        // 4️⃣ 更新数据库（关键）
        await client
          .from("checklist")
          .update({ checked: box.checked })
          .eq("id", row.id);

        loadData(); // 刷新进度
      };

      list.appendChild(label);
    });
  }
}

// 5️⃣ 搜索
document.getElementById("search").oninput = e => {
  const k = e.target.value.trim().toLowerCase();
  document.querySelectorAll("label").forEach(l => {
    l.style.display = l.innerText.toLowerCase().includes(k) ? "flex" : "none";
  });
};

// 6️⃣ 初始化
loadData();
</script>

</body>
</html>
